name: Event Demo 1
on: 
  pull_request: 
    types:
      - opened
  workflow_dispatch: 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{toJson(github.event)}}"
      - name: Get Code
        run: actions/checkout
      - name: Install dependencies
        run: npm ci
      - name: Test Code
        run: npm test
      - name: Build Code
        run: npm run build
      - name: Deploy project
        run: echo "Deploying"